<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الكاشير – GAD جاد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root {
  --gold:#FFD700; --gold-dark:#e6c200;
  --primary:#3B3FA0; --primary-dark:#2d3180;
  --accent:#D93025;
  --bg:#FFF8DC; --card:#FFFDE7; --card2:#FFF9C4;
  --text:#1a1a2e; --muted:#7a7a9a;
  --green:#2dc653; --red:#D93025; --orange:#f4a261; --blue:#3B3FA0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; background-image:repeating-linear-gradient(45deg,rgba(59,63,160,0.03) 0px,rgba(59,63,160,0.03) 1px,transparent 1px,transparent 12px); }

/* HEADER */
header {
  background:linear-gradient(135deg,#FFD700 0%,#FFE033 100%);
  border-bottom:3px solid var(--primary);
  padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
  box-shadow:0 4px 20px rgba(59,63,160,.15);
}
.hdr-left { display:flex; align-items:center; gap:12px; }
.hdr-left h1 { font-size:1.3rem; font-weight:900; color:var(--primary); }
.hdr-left p  { font-size:.78rem; color:var(--primary); opacity:.6; }
.hdr-right { display:flex; align-items:center; gap:16px; }
.live-badge { display:flex; align-items:center; gap:6px; background:rgba(59,63,160,.1); border:1px solid var(--primary); padding:6px 14px; border-radius:50px; font-size:.8rem; color:var(--primary); }
.dot { width:8px; height:8px; border-radius:50%; background:var(--primary); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }
.cashier-name { font-size:.85rem; color:var(--muted); }
.logout-btn { background:none; border:1px solid #333; color:var(--muted); padding:7px 16px; border-radius:8px; font-family:'Cairo',sans-serif; cursor:pointer; font-size:.82rem; transition:.2s; }
.logout-btn:hover { border-color:var(--red); color:var(--red); }

/* STATS BAR */
.stats { display:flex; gap:12px; padding:16px 24px; flex-wrap:wrap; }
.stat {
  background:var(--card); border:1px solid rgba(59,63,160,0.15); border-radius:12px;
  padding:12px 20px; display:flex; flex-direction:column; align-items:center;
  min-width:100px; flex:1;
}
.stat-num { font-size:1.6rem; font-weight:900; color:var(--primary); }
.stat-lbl { font-size:.75rem; color:var(--muted); }

/* FILTER TABS */
.tabs { display:flex; gap:8px; padding:0 24px 16px; overflow-x:auto; }
.tab {
  padding:7px 18px; border-radius:50px; font-family:'Cairo',sans-serif;
  font-size:.85rem; font-weight:600; cursor:pointer; border:1.5px solid rgba(59,63,160,0.25);
  background:transparent; color:var(--primary); transition:.2s; white-space:nowrap;
}
.tab:hover, .tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* ORDERS GRID */
.orders-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px; padding:0 24px 32px;
}

/* ORDER CARD */
.order-card {
  background:var(--card); border-radius:16px; overflow:hidden;
  border:1px solid rgba(59,63,160,0.15); transition:.3s;
  animation:slideIn .4s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideIn { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
.order-card.new-flash { animation:flash .8s ease; }
@keyframes flash { 0%,100%{box-shadow:none} 40%{box-shadow:0 0 0 4px var(--gold);} }
.order-card:hover { border-color:var(--primary); transform:translateY(-1px); }

/* status-based left border */
.order-card[data-status="pending"]   { border-right:4px solid var(--accent); }
.order-card[data-status="preparing"] { border-right:4px solid var(--primary); }
.order-card[data-status="done"]      { border-right:4px solid var(--green); }
.order-card[data-status="cancelled"] { border-right:4px solid var(--red); opacity:.6; }

.order-hdr {
  padding:14px 16px; display:flex; justify-content:space-between; align-items:flex-start;
  border-bottom:1px solid rgba(59,63,160,0.1);
}
.order-id { font-size:.75rem; color:var(--muted); }
.order-name { font-size:1.05rem; font-weight:800; color:var(--primary); }
.order-time { font-size:.72rem; color:var(--muted); margin-top:2px; }
.status-pill {
  padding:4px 12px; border-radius:50px; font-size:.75rem; font-weight:700;
  white-space:nowrap;
}
.pill-pending   { background:rgba(217,48,37,.12);   color:var(--accent); border:1px solid var(--accent); }
.pill-preparing { background:rgba(59,63,160,.12);   color:var(--primary);border:1px solid var(--primary); }
.pill-done      { background:rgba(45,198,83,.12);   color:var(--green);  border:1px solid var(--green); }
.pill-cancelled { background:rgba(230,57,70,.12);   color:var(--red);    border:1px solid var(--red); }

.order-items { padding:12px 16px; display:flex; flex-direction:column; gap:6px; }
.oi { display:flex; justify-content:space-between; align-items:center; font-size:.85rem; }
.oi-name { color:var(--text); }
.oi-meta { color:var(--muted); font-size:.78rem; }

.order-footer {
  padding:12px 16px; border-top:1px solid rgba(59,63,160,0.1);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
}
.total-lbl { font-size:1rem; font-weight:800; }
.total-lbl span { color:var(--primary); }

.actions { display:flex; gap:6px; flex-wrap:wrap; }
.act-btn {
  padding:6px 12px; border-radius:8px; font-family:'Cairo',sans-serif;
  font-size:.78rem; font-weight:700; cursor:pointer; border:none; transition:.15s;
}
.btn-prepare { background:rgba(59,63,160,.12); color:var(--primary); border:1px solid var(--primary); }
.btn-prepare:hover { background:var(--primary); color:#fff; }
.btn-done { background:rgba(45,198,83,.15); color:var(--green); border:1px solid var(--green); }
.btn-done:hover { background:var(--green); color:#000; }
.btn-cancel { background:rgba(230,57,70,.12); color:var(--red); border:1px solid var(--red); }
.btn-cancel:hover { background:var(--red); color:#fff; }
.btn-delete { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid #333; }
.btn-delete:hover { background:var(--red); color:#fff; border-color:var(--red); }

/* EMPTY STATE */
.empty { text-align:center; padding:80px 20px; color:var(--muted); }
.empty .big { font-size:4rem; margin-bottom:12px; }
.empty p { font-size:1rem; }

/* TOAST */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--primary); border:1px solid var(--gold); color:#fff;
  padding:12px 24px; border-radius:50px; font-size:.9rem; z-index:999;
  transition:.35s cubic-bezier(.34,1.4,.64,1); white-space:nowrap;
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* BELL ANIMATION */
@keyframes ring { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-15deg)} 40%{transform:rotate(15deg)} 60%{transform:rotate(-10deg)} 80%{transform:rotate(10deg)} }
.bell-ring { animation:ring .5s ease; }
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <img src="/static/logo.jpg" alt="GAD" style="height:44px;border-radius:8px;border:2px solid var(--primary);">
    <div>
      <h1>لوحة الكاشير – GAD جاد</h1>
      <p>Cashtarhar Dashboard</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="live-badge"><span class="dot"></span> مباشر</div>
    <span class="cashier-name">👤 {{ cashier }}</span>
    <button class="logout-btn" onclick="location.href='/cashtarhar/logout'">خروج</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num" id="statAll">0</div><div class="stat-lbl">إجمالي الطلبات</div></div>
  <div class="stat"><div class="stat-num" id="statPending" style="color:var(--accent)">0</div><div class="stat-lbl">⏳ انتظار</div></div>
  <div class="stat"><div class="stat-num" id="statPrep" style="color:var(--primary)">0</div><div class="stat-lbl">🍳 جاري التحضير</div></div>
  <div class="stat"><div class="stat-num" id="statDone" style="color:var(--green)">0</div><div class="stat-lbl">✅ اتسلم</div></div>
  <div class="stat"><div class="stat-num" id="statRevenue" style="color:var(--primary)">0</div><div class="stat-lbl">💰 مبيعات (جنيه)</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setFilter('all',this)">الكل</button>
  <button class="tab" onclick="setFilter('pending',this)">⏳ انتظار</button>
  <button class="tab" onclick="setFilter('preparing',this)">🍳 تحضير</button>
  <button class="tab" onclick="setFilter('done',this)">✅ اتسلم</button>
  <button class="tab" onclick="setFilter('cancelled',this)">❌ ملغي</button>
</div>

<div class="orders-grid" id="ordersGrid">
  <div class="empty"><div class="big">📋</div><p>لا يوجد طلبات بعد</p></div>
</div>

<div id="toast"></div>

<script>
const socket = io();
let orders = {{ orders | tojson }};
let currentFilter = 'all';

// ── helpers ───────────────────────────────────────────────────────────────────
const STATUS_LABEL = { pending:'انتظار', preparing:'جاري التحضير', done:'اتسلم', cancelled:'ملغي' };
const STATUS_PILL  = { pending:'pill-pending', preparing:'pill-preparing', done:'pill-done', cancelled:'pill-cancelled' };

function pillHtml(status) {
  return `<span class="status-pill ${STATUS_PILL[status]}">${STATUS_LABEL[status]}</span>`;
}

function actionBtns(order) {
  const id = order.id; const st = order.status;
  let html = '';
  if (st === 'pending')   html += `<button class="act-btn btn-prepare" onclick="setStatus(${id},'preparing')">🍳 جاري</button>`;
  if (st !== 'done' && st !== 'cancelled') html += `<button class="act-btn btn-done" onclick="setStatus(${id},'done')">✅ سلّم</button>`;
  if (st !== 'cancelled') html += `<button class="act-btn btn-cancel" onclick="setStatus(${id},'cancelled')">❌ إلغاء</button>`;
  html += `<button class="act-btn btn-delete" onclick="delOrder(${id})">🗑</button>`;
  return html;
}

function orderCardHtml(o) {
  const items = o.items.map(i => `
    <div class="oi">
      <span class="oi-name">${i.emoji || '🍗'} ${i.name}</span>
      <span class="oi-meta">${i.qty} × ${i.price} = ${i.qty*i.price} جنيه</span>
    </div>`).join('');
  return `
  <div class="order-card" id="order-${o.id}" data-status="${o.status}">
    <div class="order-hdr">
      <div>
        <div class="order-id">#${o.id}</div>
        <div class="order-name">👤 ${o.customer_name}</div>
        <div class="order-time">🕐 ${o.time}</div>
      </div>
      <div id="pill-${o.id}">${pillHtml(o.status)}</div>
    </div>
    <div class="order-items">${items}</div>
    <div class="order-footer">
      <div class="total-lbl">الإجمالي: <span>${o.total} جنيه</span></div>
      <div class="actions" id="actions-${o.id}">${actionBtns(o)}</div>
    </div>
  </div>`;
}

function renderAll() {
  const grid = document.getElementById('ordersGrid');
  const visible = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);
  if (!visible.length) {
    grid.innerHTML = `<div class="empty"><div class="big">📋</div><p>لا يوجد طلبات</p></div>`;
  } else {
    grid.innerHTML = visible.map(orderCardHtml).join('');
  }
  updateStats();
}

function updateStats() {
  document.getElementById('statAll').textContent     = orders.length;
  document.getElementById('statPending').textContent = orders.filter(o=>o.status==='pending').length;
  document.getElementById('statPrep').textContent    = orders.filter(o=>o.status==='preparing').length;
  document.getElementById('statDone').textContent    = orders.filter(o=>o.status==='done').length;
  const rev = orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+o.total,0);
  document.getElementById('statRevenue').textContent = rev;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function setStatus(id, status) {
  socket.emit('update_status', { order_id: id, status });
}

function delOrder(id) {
  if (!confirm('مسح الطلب؟')) return;
  socket.emit('delete_order', { order_id: id });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function playBell() {
  // Cashier new-order: sharp double ding-dong alert
  try {
    const ctx = new AudioContext();
    const seq = [
      {f:1200, t:0,    d:0.08, v:0.6},
      {f:900,  t:0.10, d:0.12, v:0.5},
      {f:1200, t:0.28, d:0.08, v:0.6},
      {f:900,  t:0.38, d:0.18, v:0.5},
    ];
    seq.forEach(({f,t,d,v}) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(f, ctx.currentTime+t);
      g.gain.setValueAtTime(0, ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(v, ctx.currentTime+t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+d);
      o.start(ctx.currentTime+t);
      o.stop(ctx.currentTime+t+d+0.02);
    });
    // low thump underneath
    const sub = ctx.createOscillator(), sg = ctx.createGain();
    sub.connect(sg); sg.connect(ctx.destination);
    sub.type = 'sine'; sub.frequency.value = 120;
    sg.gain.setValueAtTime(0.4, ctx.currentTime);
    sg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.25);
    sub.start(); sub.stop(ctx.currentTime+0.28);
  } catch(e) {}
}


// ── Socket.IO ─────────────────────────────────────────────────────────────────
socket.on('connect',    () => console.log('🟢 Cashier connected'));
socket.on('disconnect', () => showToast('⚠️ انقطع الاتصال — بيتصل تاني'));

socket.on('new_order', order => {
  orders.unshift(order);
  renderAll();
  playBell();
  showToast(`🔔 طلب جديد من ${order.customer_name}! (#${order.id})`);
  // flash the card
  setTimeout(() => {
    const el = document.getElementById('order-' + order.id);
    if (el) el.classList.add('new-flash');
  }, 50);
});

socket.on('order_status_changed', ({order_id, status}) => {
  const o = orders.find(x=>x.id===order_id);
  if (o) {
    o.status = status;
    const card = document.getElementById('order-' + order_id);
    if (card) {
      card.dataset.status = status;
      document.getElementById('pill-' + order_id).innerHTML    = pillHtml(status);
      document.getElementById('actions-' + order_id).innerHTML = actionBtns(o);
      if (currentFilter !== 'all' && status !== currentFilter) card.remove();
    }
    updateStats();
    showToast(`📝 طلب #${order_id} → ${STATUS_LABEL[status]}`);
  }
});

socket.on('order_deleted', ({order_id}) => {
  orders = orders.filter(o=>o.id!==order_id);
  const card = document.getElementById('order-' + order_id);
  if (card) { card.style.opacity='0'; card.style.transform='scale(.9)'; setTimeout(()=>card.remove(),300); }
  updateStats();
  showToast(`🗑 طلب #${order_id} اتمسح`);
});

// ── init ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
